training_smoke:
  name: "10_training_loop_smoke_test"
  output_subdir: "outputs/training_smoke/10_training_loop_smoke_test"
  random_seed: 42

  required_previous_steps:
    temporal_data_module_summary_json: "outputs/temporal_data_modules/09_verify_temporal_data_modules/09_temporal_data_module_summary.json"
    architecture_summary_json: "outputs/architecture/07_define_model_architecture/07_architecture_summary.json"
    require_passed: true

  inputs:
    temporal_view_index: "outputs/temporal_views/08_prepare_temporal_feature_views/08_temporal_view_index.csv"
    split_index: "outputs/splits/03_prepare_leakage_safe_splits/03_split_index.csv"

  run_selection:
    max_runs: 6
    prefer_protocols: ["subject_loso", "subject_mixed_upper_bound"]
    required_dataset_tasks:
      - dataset: "SEED-IV"
        task: "seed_iv_label"
      - dataset: "DREAMER"
        task: "valence_binary"
      - dataset: "DREAMER"
        task: "arousal_binary"
      - dataset: "DREAMER"
        task: "dominance_binary"
      - dataset: "AMIGOS"
        task: "valence_binary"
      - dataset: "AMIGOS"
        task: "arousal_binary"

  loader:
    batch_size: 8
    num_workers: 0
    pin_memory: true

  training:
    epochs: 2
    max_train_batches_per_epoch: 3
    max_eval_batches: 2
    learning_rate: 0.0005
    weight_decay: 0.0001
    gradient_clip_norm: 1.0

  model:
    hidden_dim: 128
    dropout: 0.20
    temporal_backbone: "bigru"
    fusion: "gated_attention"
    head: "spike_readout"
    spike_steps: 8
    spike_decay: 0.85
    spike_threshold: 1.0
    spike_slope: 10.0

  tasks:
    SEED-IV:
      seed_iv_label:
        label_column: "label_seed_iv"
        num_classes: 4
        modality_keys: ["eeg_combined", "eye_features"]

    DREAMER:
      valence_binary:
        label_column: "valence_binary"
        num_classes: 2
        modality_keys: ["eeg_temporal_features", "ecg_temporal_features"]
      arousal_binary:
        label_column: "arousal_binary"
        num_classes: 2
        modality_keys: ["eeg_temporal_features", "ecg_temporal_features"]
      dominance_binary:
        label_column: "dominance_binary"
        num_classes: 2
        modality_keys: ["eeg_temporal_features", "ecg_temporal_features"]

    AMIGOS:
      valence_binary:
        label_column: "valence_binary"
        num_classes: 2
        modality_keys: ["feature_bag"]
      arousal_binary:
        label_column: "arousal_binary"
        num_classes: 2
        modality_keys: ["feature_bag"]
